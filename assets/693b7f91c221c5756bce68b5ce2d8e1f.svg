oke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Pixel" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">当暴露在点击确定后的场景时，有极小部分人群会</tspan><tspan x="0" dy="46.15px">引发癲病。这种情形可能是由于某些未査出的癫病</tspan><tspan x="0" dy="46.15px">症状引起，即使该人员并没有患癫痫病史也有可能</tspan><tspan x="0" dy="46.15px">造成此类病症。如果您的家人或任何家庭成员曾有</tspan><tspan x="0" dy="46.15px">过类似症状，请在点击确定前咨询您的医生或医师。</tspan><tspan x="0" dy="46.15px">如果您在稍后出现任何症状，包括头晕、目眩眼部</tspan><tspan x="0" dy="46.15px">或肌肉抽搐、失去意识、失去方向感、抽搐或出现</tspan><tspan x="0" dy="46.15px">任何自己无法控制的动作，请立即关闭游戏并咨询</tspan><tspan x="0" dy="46.15px">您的医生或医师。这是最后的警告，是否继续操作？</tspan></text></g></g></svg>